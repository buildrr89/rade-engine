name: "RADE PR Score Diff"
description: "Run RADE on PR base/head refs and comment reusability/accessibility score deltas."
author: "Buildrr89"
branding:
  icon: "bar-chart-2"
  color: "blue"
inputs:
  github-token:
    description: "GitHub token used to read PR metadata and post comments."
    required: true
  pr-number:
    description: "Pull request number."
    required: true
  base-sha:
    description: "Base commit SHA for comparison."
    required: true
  head-sha:
    description: "Head commit SHA for comparison."
    required: true
  input-path:
    description: "Path to RADE input JSON fixture inside the repository."
    required: false
    default: "examples/sample_ios_output.json"
  app-id:
    description: "Application identifier passed to RADE CLI."
    required: false
    default: "com.example.legacyapp"
  python-version:
    description: "Python runtime version used to run RADE CLI."
    required: false
    default: "3.14"
  fail-on-regression:
    description: "If true, fail when reusability drops or accessibility risk rises."
    required: false
    default: "false"
runs:
  using: "composite"
  steps:
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install RADE runtime dependencies
      shell: bash
      run: python -m pip install --disable-pip-version-check neo4j playwright pyyaml

    - name: Generate base/head reports
      shell: bash
      run: |
        set -euo pipefail
        export PYTHONPATH="${GITHUB_ACTION_PATH}"
        INPUT_FILE="${GITHUB_WORKSPACE}/${{ inputs.input-path }}"
        if [ ! -f "$INPUT_FILE" ]; then
          echo "RADE action input file not found: $INPUT_FILE" >&2
          exit 1
        fi
        git checkout --quiet "${{ inputs.base-sha }}"
        python -m src.core.cli analyze \
          --input "$INPUT_FILE" \
          --app-id "${{ inputs.app-id }}" \
          --json-output "$RUNNER_TEMP/rade-base.json"
        git checkout --quiet "${{ inputs.head-sha }}"
        python -m src.core.cli analyze \
          --input "$INPUT_FILE" \
          --app-id "${{ inputs.app-id }}" \
          --json-output "$RUNNER_TEMP/rade-head.json"

    - name: Evaluate regression gate status
      id: regression
      shell: bash
      run: |
        set -euo pipefail
        export PYTHONPATH="${GITHUB_ACTION_PATH}"
        python - <<'PY'
        import os
        from pathlib import Path
        from src.core.pr_score_diff import build_score_diff, has_score_regression, load_report

        enabled = os.environ["RADE_FAIL_ON_REGRESSION"] == "true"
        base_report = load_report(Path(f"{os.environ['RUNNER_TEMP']}/rade-base.json"))
        head_report = load_report(Path(f"{os.environ['RUNNER_TEMP']}/rade-head.json"))
        diff = build_score_diff(base_report, head_report)
        has_regression = has_score_regression(diff)

        if enabled and has_regression:
            status = "enabled:failed"
            should_fail = "true"
        elif enabled:
            status = "enabled:passed"
            should_fail = "false"
        else:
            status = "disabled"
            should_fail = "false"

        output_path = Path(os.environ["GITHUB_OUTPUT"])
        output_path.write_text(
            f"gate_status={status}\nshould_fail={should_fail}\n", encoding="utf-8"
        )
        print(f"RADE regression gate status: {status}")
        PY
      env:
        RADE_FAIL_ON_REGRESSION: ${{ inputs.fail-on-regression }}

    - name: Build PR comment body
      shell: bash
      run: |
        set -euo pipefail
        export PYTHONPATH="${GITHUB_ACTION_PATH}"
        python "${GITHUB_ACTION_PATH}/scripts/pr_score_comment.py" \
          --base-report "$RUNNER_TEMP/rade-base.json" \
          --head-report "$RUNNER_TEMP/rade-head.json" \
          --base-ref "${{ inputs.base-sha }}" \
          --head-ref "${{ inputs.head-sha }}" \
          --gate-status "${{ steps.regression.outputs.gate_status }}" \
          --output "$RUNNER_TEMP/rade-comment.md"

    - name: Post or update PR comment
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require("fs");
          const marker = "<!-- rade-pr-score-comment -->";
          const issue_number = Number("${{ inputs.pr-number }}");
          const body = fs.readFileSync(`${process.env.RUNNER_TEMP}/rade-comment.md`, "utf8");

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number,
            per_page: 100
          });

          const existing = comments.find((comment) => comment.body && comment.body.includes(marker));

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body
            });
          }

    - name: Enforce regression gate
      if: ${{ steps.regression.outputs.should_fail == 'true' }}
      shell: bash
      run: |
        echo "RADE regression gate failed: reusability decreased and/or accessibility_risk increased." >&2
        exit 1
