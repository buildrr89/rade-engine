name: PR Score Diff

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  rade-pr-score-diff:
    runs-on: ubuntu-latest
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: RADE score diff comment
        id: rade_score_diff
        uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-number: ${{ env.PR_NUMBER }}
          base-sha: ${{ env.BASE_SHA }}
          head-sha: ${{ env.HEAD_SHA }}
          input-path: examples/sample_ios_output.json
          app-id: com.example.legacyapp

      - name: Publish RADE score summary
        shell: bash
        env:
          GATE_STATUS: ${{ steps.rade_score_diff.outputs.gate-status }}
          SHOULD_FAIL: ${{ steps.rade_score_diff.outputs.should-fail }}
          REUSABILITY_DELTA: ${{ steps.rade_score_diff.outputs.reusability-delta }}
          ACCESSIBILITY_RISK_DELTA: ${{ steps.rade_score_diff.outputs.accessibility-risk-delta }}
          REGRESSION_REASON: ${{ steps.rade_score_diff.outputs.regression-reason }}
          REGRESSION_DETECTED: ${{ steps.rade_score_diff.outputs.regression-detected }}
          AXE_GATE_STATUS: ${{ steps.rade_score_diff.outputs.axe-gate-status }}
          AXE_REGRESSION_REASON: ${{ steps.rade_score_diff.outputs.axe-regression-reason }}
          AXE_REGRESSION_DETECTED: ${{ steps.rade_score_diff.outputs.axe-regression-detected }}
        run: |
          {
            echo "## RADE score diff"
            echo ""
            echo "- Gate status: \`${GATE_STATUS}\`"
            echo "- Should fail: \`${SHOULD_FAIL}\`"
            echo "- Reusability delta: \`${REUSABILITY_DELTA}\`"
            echo "- Accessibility risk delta: \`${ACCESSIBILITY_RISK_DELTA}\`"
            echo "- Regression reason: \`${REGRESSION_REASON}\`"
            echo "- Regression detected: \`${REGRESSION_DETECTED}\`"
            echo "- Axe gate status: \`${AXE_GATE_STATUS}\`"
            echo "- Axe regression reason: \`${AXE_REGRESSION_REASON}\`"
            echo "- Axe regression detected: \`${AXE_REGRESSION_DETECTED}\`"
          } >> "$GITHUB_STEP_SUMMARY"
