name: Publish rade-engine to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build only (do not publish)"
        required: false
        default: "true"

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Run tests
        run: uv run --python 3.12 pytest -q

      - name: Build distributions
        run: uv build

      - name: Verify build metadata
        run: uv run --python 3.12 --with twine twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: rade-engine-dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == 'false')
    environment:
      name: pypi
      url: https://pypi.org/project/rade-engine/
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: rade-engine-dist
          path: dist/

      - name: Publish to PyPI via OIDC
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
