name: Proof

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  proof:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python dependencies
        run: uv sync --dev

      - name: Install web dependencies
        run: pnpm --dir web install --frozen-lockfile

      - name: Python tests
        run: ./rade-proof

      - name: Ruff
        run: uv run ruff check src tests agent

      - name: Black
        run: uv run black --check src tests agent

      - name: Web lint
        run: pnpm --dir web lint

      - name: Web smoke test
        run: pnpm --dir web test

      - name: Sample analyze proof
        run: |
          uv run python -m src.core.cli analyze \
            --input examples/sample_ios_output.json \
            --app-id com.example.legacyapp \
            --json-output output/modernization_report.json \
            --md-output output/modernization_report.md \
            --html-output output/modernization_report.html | tee proof-output.txt

      - name: Publish proof summary
        run: |
          {
            echo "## Proof Summary"
            echo
            echo '```text'
            cat proof-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
